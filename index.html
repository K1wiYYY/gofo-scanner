<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#0f172a">
  <title>GOFO 扫码记录</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --card: #1e293b; --border: #334155;
      --accent: #3b82f6; --text: #f1f5f9; --sub: #94a3b8;
      --danger: #ef4444; --success: #22c55e;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    #app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px 10px; flex-shrink: 0; }
    .header-title { font-size: 20px; font-weight: 700; }
    .header-badge { background: var(--accent); border-radius: 20px;
      padding: 4px 12px; font-size: 13px; font-weight: 600; }

    /* Tabs */
    .tabs { display: flex; margin: 0 20px 14px; background: var(--card);
      border-radius: 10px; padding: 4px; gap: 4px; flex-shrink: 0; }
    .tab { flex: 1; padding: 9px; border: none; border-radius: 7px;
      background: transparent; color: var(--sub); font-size: 14px;
      font-weight: 500; cursor: pointer; transition: all .15s; }
    .tab.active { background: var(--accent); color: #fff; font-weight: 700; }

    /* ── Scan Tab ── */
    #tab-scan { display: flex; flex-direction: column; flex: 1;
      padding: 0 20px 24px; gap: 16px; overflow: hidden; }

    /* The big input — always focused */
    .scan-input-wrap { position: relative; }
    .scan-input {
      width: 100%; padding: 20px 52px 20px 20px;
      background: var(--card); border: 2px solid var(--accent);
      border-radius: 16px; color: var(--text);
      font-size: 18px; font-weight: 600; font-family: monospace;
      letter-spacing: 0.5px; outline: none;
      caret-color: var(--accent);
      -webkit-user-select: text; user-select: text;
    }
    .scan-input::placeholder { color: var(--sub); font-weight: 400;
      font-family: -apple-system, sans-serif; font-size: 15px; letter-spacing: 0; }
    .scan-input.flash { border-color: var(--success); background: rgba(34,197,94,.08); }
    .scan-input.dup   { border-color: var(--danger);  background: rgba(239,68,68,.08); }
    .clear-input-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: var(--border); border: none; border-radius: 50%;
      width: 28px; height: 28px; color: var(--sub); font-size: 16px;
      cursor: pointer; display: none; align-items: center; justify-content: center;
    }
    .scan-hint-text { text-align: center; color: var(--sub); font-size: 13px; }

    /* Last scan */
    .last-scan { background: var(--card); border-radius: 12px;
      padding: 14px 16px; border: 1px solid var(--border); flex-shrink: 0; }
    .last-scan-label { font-size: 11px; color: var(--sub); font-weight: 500;
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
    .last-scan-value { font-size: 17px; font-weight: 700;
      font-family: 'SF Mono', monospace; letter-spacing: .5px; word-break: break-all; }
    .last-scan-value.new { color: var(--success); }
    .last-scan-value.dup { color: var(--danger); }

    /* Recent list in scan tab */
    .recent-label { font-size: 12px; color: var(--sub); font-weight: 500;
      text-transform: uppercase; letter-spacing: .5px; flex-shrink: 0; }
    .recent-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .recent-item { display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--card); border-radius: 8px;
      margin-bottom: 6px; border: 1px solid var(--border); }
    .recent-num { width: 28px; height: 28px; border-radius: 50%;
      background: rgba(59,130,246,.15); display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; }
    .recent-num-text { color: var(--accent); font-size: 12px; font-weight: 700; }
    .recent-tracking { flex: 1; font-size: 14px; font-weight: 600;
      font-family: monospace; min-width: 0; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; }
    .recent-time { font-size: 11px; color: var(--sub); flex-shrink: 0; }

    /* ── List Tab ── */
    #tab-list { display: none; flex-direction: column; flex: 1;
      overflow: hidden; padding: 0 20px 20px; }
    .list-actions { display: flex; gap: 10px; margin-bottom: 14px; flex-shrink: 0; }
    .btn-export { flex: 1; background: var(--accent); color: #fff; border: none;
      border-radius: 10px; padding: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .btn-export:active { opacity: .8; }
    .btn-clear { background: transparent; color: var(--danger);
      border: 1px solid var(--danger); border-radius: 10px;
      padding: 12px 18px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-clear:active { opacity: .7; }
    .records-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .record-item { display: flex; align-items: center; gap: 12px;
      background: var(--card); border-radius: 10px; padding: 12px;
      margin-bottom: 8px; border: 1px solid var(--border); }
    .record-index { width: 32px; height: 32px; border-radius: 50%;
      background: rgba(59,130,246,.15); display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; }
    .record-index-text { color: var(--accent); font-size: 13px; font-weight: 700; }
    .record-body { flex: 1; min-width: 0; }
    .record-tracking { font-size: 15px; font-weight: 600; font-family: monospace;
      letter-spacing: .3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .record-meta { font-size: 11px; color: var(--sub); margin-top: 3px; }
    .record-copy { background: var(--border); border: none; border-radius: 6px;
      color: var(--sub); font-size: 11px; padding: 4px 8px; cursor: pointer; flex-shrink: 0; }
    .record-copy:active { background: var(--accent); color: #fff; }
    .empty-state { flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px; }
    .empty-title { color: var(--sub); font-size: 17px; font-weight: 600; }
    .empty-hint { color: var(--border); font-size: 13px; }

    /* Toast */
    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      color: #fff; padding: 10px 20px; border-radius: 24px; font-size: 14px;
      font-weight: 600; opacity: 0; transition: opacity .2s; pointer-events: none;
      white-space: nowrap; z-index: 999; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <span class="header-title">GOFO 扫码记录</span>
    <span class="header-badge" id="badge">0 票</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('scan')">扫　码</button>
    <button class="tab" id="tab-list-btn" onclick="switchTab('list')">记录 (<span id="count">0</span>)</button>
  </div>

  <!-- Scan Tab -->
  <div id="tab-scan">
    <!-- Always-focused input: works with PDA scanner / Bluetooth scanner -->
    <div class="scan-input-wrap">
      <input id="scan-input" class="scan-input" type="text"
        placeholder="对准条形码扫描，或手动输入运单号"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        inputmode="text" enterkeyhint="done" />
      <button class="clear-input-btn" id="clear-btn" onclick="clearInput()">✕</button>
    </div>
    <p class="scan-hint-text">扫描枪 / 手机蓝牙扫码器 → 自动记录 ·  手动输入后按回车</p>

    <div class="last-scan">
      <div class="last-scan-label">最近扫描</div>
      <div class="last-scan-value" id="last-value">—</div>
    </div>

    <div class="recent-label">本次记录</div>
    <div class="recent-list" id="recent-list"></div>
  </div>

  <!-- List Tab -->
  <div id="tab-list">
    <div class="list-actions">
      <button class="btn-export" onclick="exportCSV()">导出 CSV</button>
      <button class="btn-clear" id="btn-clear" style="display:none" onclick="clearAll()">清空</button>
    </div>
    <div class="records-list" id="records-list">
      <div class="empty-state" id="empty-state">
        <div class="empty-title">暂无记录</div>
        <div class="empty-hint">扫码后记录显示在这里</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'gofo_records';
  let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let scannedSet = new Set(records.map(r => r.trackingNo));

  const inputEl = document.getElementById('scan-input');
  const clearBtn = document.getElementById('clear-btn');

  // ── Init ──
  updateUI();
  keepFocus();

  // Check URL param ?add=TRACKINGNO (from iOS Shortcut)
  (() => {
    const val = new URLSearchParams(location.search).get('add');
    if (!val) return;
    history.replaceState(null, '', location.pathname);
    setTimeout(() => record(val.trim()), 300);
  })();

  // ── Keep input focused (PDA scanner needs this) ──
  function keepFocus() {
    inputEl.focus();
    // Re-focus if user taps elsewhere (but not on tab-list or buttons)
    document.addEventListener('touchend', e => {
      if (!e.target.closest('#tab-list') && !e.target.closest('.tabs') &&
          !e.target.closest('.list-actions') && !e.target.closest('.record-copy')) {
        setTimeout(() => inputEl.focus(), 50);
      }
    });
    document.addEventListener('click', e => {
      if (!e.target.closest('#tab-list') && !e.target.closest('.tabs') &&
          !e.target.closest('.list-actions') && !e.target.closest('.record-copy')) {
        inputEl.focus();
      }
    });
  }

  // ── Input events ──
  inputEl.addEventListener('input', () => {
    clearBtn.style.display = inputEl.value ? 'flex' : 'none';
  });

  // PDA scanners send Enter after each scan — also handles manual entry
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.keyCode === 13) {
      e.preventDefault();
      const val = inputEl.value.trim();
      if (val) submit(val);
    }
  });

  // Some PDA scanners don't send keydown but fire change rapidly — catch via input event
  // If input value length > 5 and no input for 150ms → auto-submit (PDA fast-paste)
  let autoTimer = null;
  inputEl.addEventListener('input', () => {
    clearTimeout(autoTimer);
    if (inputEl.value.trim().length >= 6) {
      autoTimer = setTimeout(() => {
        const val = inputEl.value.trim();
        if (val) submit(val);
      }, 150);
    }
  });

  function clearInput() {
    inputEl.value = '';
    clearBtn.style.display = 'none';
    inputEl.focus();
  }

  function submit(val) {
    inputEl.value = '';
    clearBtn.style.display = 'none';
    clearTimeout(autoTimer);
    inputEl.focus();
    record(val);
  }

  // ── Record tracking number ──
  function record(trackingNo) {
    const el = document.getElementById('last-value');
    el.textContent = trackingNo;

    if (scannedSet.has(trackingNo)) {
      el.className = 'last-scan-value dup';
      inputEl.classList.add('dup');
      setTimeout(() => inputEl.classList.remove('dup'), 600);
      showToast('⚠︎ 已记录过', 'warn');
      if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
      return;
    }

    scannedSet.add(trackingNo);
    el.className = 'last-scan-value new';
    setTimeout(() => el.classList.remove('new'), 1500);
    inputEl.classList.add('flash');
    setTimeout(() => inputEl.classList.remove('flash'), 500);
    if (navigator.vibrate) navigator.vibrate(60);

    const rec = {
      id: String(Date.now()),
      trackingNo,
      time: new Date().toLocaleString('zh-CN', { hour12: false }),
    };
    records.unshift(rec);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    updateUI();
    showToast('✓ ' + trackingNo);
  }

  // ── UI ──
  function switchTab(tab) {
    const isScan = tab === 'scan';
    document.getElementById('tab-scan').style.display = isScan ? 'flex' : 'none';
    document.getElementById('tab-list').style.display = isScan ? 'none' : 'flex';
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', isScan ? i === 0 : i === 1));
    if (isScan) setTimeout(() => inputEl.focus(), 100);
  }

  function updateUI() {
    const n = records.length;
    document.getElementById('badge').textContent = n + ' 票';
    document.getElementById('count').textContent = n;
    document.getElementById('btn-clear').style.display = n > 0 ? 'block' : 'none';
    document.getElementById('empty-state').style.display = n === 0 ? 'flex' : 'none';

    // Recent list (scan tab — latest 20)
    document.getElementById('recent-list').innerHTML = records.slice(0, 20).map((r, i) => `
      <div class="recent-item">
        <div class="recent-num"><span class="recent-num-text">${n - i}</span></div>
        <span class="recent-tracking">${escHtml(r.trackingNo)}</span>
        <span class="recent-time">${r.time.split(' ')[1] || r.time}</span>
      </div>`).join('');

    // Full list (list tab)
    document.getElementById('records-list').innerHTML =
      (n === 0 ? '<div class="empty-state"><div class="empty-title">暂无记录</div><div class="empty-hint">扫码后记录显示在这里</div></div>' : '') +
      records.map((r, i) => `
      <div class="record-item">
        <div class="record-index"><span class="record-index-text">${n - i}</span></div>
        <div class="record-body">
          <div class="record-tracking">${escHtml(r.trackingNo)}</div>
          <div class="record-meta">${r.time}</div>
        </div>
        <button class="record-copy" onclick="copyText('${escHtml(r.trackingNo)}')">复制</button>
      </div>`).join('');
  }

  // ── Export ──
  function exportCSV() {
    if (!records.length) { showToast('暂无记录'); return; }
    const csv = '﻿运单号,扫描时间\n' + records.map(r => `"${r.trackingNo}","${r.time}"`).join('\n');
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' })),
      download: `GOFO扫码记录_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.csv`
    });
    a.click();
    showToast('CSV 已导出');
  }

  function clearAll() {
    if (!confirm(`确认清空全部 ${records.length} 条记录？`)) return;
    records = []; scannedSet.clear();
    localStorage.removeItem(STORAGE_KEY);
    updateUI(); showToast('已清空');
  }

  function copyText(t) { navigator.clipboard?.writeText(t).then(() => showToast('已复制')); }

  // ── Toast ──
  let toastTimer;
  function showToast(msg, type = 'ok') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = type === 'warn' ? 'var(--danger)' : 'var(--success)';
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
